<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandMixed Pro - Professional DJ Studio</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/static/css/fullscreen-cam-layout.css">
    
    <!-- Required Libraries -->
    <script src="https://unpkg.com/@mediapipe/hands/hands.js"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"></script>
</head>
<body>
    <div class="studio-fullscreen">
        <!-- Camera Full Background -->
        <div class="camera-fullscreen">
            <video id="video" autoplay muted playsinline hidden></video>
            <canvas id="canvas"></canvas>
            
            <div class="camera-placeholder" id="cameraPlaceholder">
                <div class="placeholder-content">
                    <div class="placeholder-icon">CAMERA</div>
                    <button class="start-camera-btn" id="startHandDJBtn">START HAND DJ</button>
                </div>
            </div>
        </div>

        <!-- Header Bar -->
        <header class="header-bar">
            <h1 class="logo-title">HANDMIXED</h1>
            <div class="header-controls">
                <button class="header-btn logout" onclick="window.location.href='/logout/'">LOGOUT</button>
            </div>
        </header>

        <!-- Left Deck Panel -->
        <div class="deck-overlay-panel left">
            <div class="deck-header">
                <div class="deck-label">
                    <span>DECK A</span>
                </div>
                <div class="bpm-display">-- BPM</div>
            </div>

            <div class="track-display" id="trackDisplayA">
                <div class="no-track" onclick="window.selectTrackForDeck('A')" style="cursor: pointer;">
                    <div class="track-art">♪</div>
                    <div>Click to load track</div>
                </div>
            </div>

            <!-- Channel Controls -->
            <div class="channel-controls">
                <div class="channel-btn active" data-channel="bass">
                    <div class="channel-led"></div>
                    <span class="channel-label">BASS</span>
                </div>
                <div class="channel-btn active" data-channel="drums">
                    <div class="channel-led"></div>
                    <span class="channel-label">DRUMS</span>
                </div>
                <div class="channel-btn active" data-channel="synth">
                    <div class="channel-led"></div>
                    <span class="channel-label">SYNTH</span>
                </div>
            </div>

            <!-- Main Waveform -->
            <div class="main-waveform-section">
                <div class="main-waveform-container" id="mainWaveformA">
                    <canvas class="main-waveform-canvas" id="mainWaveformCanvasA"></canvas>
                    <div class="waveform-progress" id="waveformProgressA"></div>
                    <input type="range" class="waveform-seek-slider" id="seekSliderA" min="0" max="100" value="0" 
                           oninput="window.handleSeek('A', this.value)">
                </div>
                <div class="track-time-info">
                    <span id="currentTimeA">0:00</span> / <span id="durationA">0:00</span>
                </div>
            </div>

            <!-- Deck Controls -->
            <div class="deck-controls">
                <button class="play-deck-btn" onclick="window.toggleDeckPlayback('A')">
                    PLAY DECK A
                </button>
            </div>

            <!-- Volume -->
            <div class="volume-section">
                <div class="volume-label">Volume <span id="volumeLabelA">50</span>%</div>
                <input type="range" class="volume-slider" id="volumeSliderA" min="0" max="100" value="50" 
                       oninput="window.updateDeckVolume('A', this.value)">
            </div>

            <!-- Waveforms -->
            <div class="waveform-section">
                <div class="waveform-label">BASS/KICK</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformBassA"></canvas>
                </div>
            </div>
            <div class="waveform-section">
                <div class="waveform-label">DRUMS</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformDrumsA"></canvas>
                </div>
            </div>
            <div class="waveform-section">
                <div class="waveform-label">SYNTH</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformSynthA"></canvas>
                </div>
            </div>

        </div>

        <!-- Right Deck Panel -->
        <div class="deck-overlay-panel right">
            <div class="deck-header">
                <div class="deck-label">
                    <span>DECK B</span>
                </div>
                <div class="bpm-display">-- BPM</div>
            </div>

            <div class="track-display" id="trackDisplayB">
                <div class="no-track" onclick="window.selectTrackForDeck('B')" style="cursor: pointer;">
                    <div class="track-art">♪</div>
                    <div>Click to load track</div>
                </div>
            </div>

            <!-- Channel Controls -->
            <div class="channel-controls">
                <div class="channel-btn active" data-channel="bass">
                    <div class="channel-led"></div>
                    <span class="channel-label">BASS</span>
                </div>
                <div class="channel-btn active" data-channel="drums">
                    <div class="channel-led"></div>
                    <span class="channel-label">DRUMS</span>
                </div>
                <div class="channel-btn active" data-channel="synth">
                    <div class="channel-led"></div>
                    <span class="channel-label">SYNTH</span>
                </div>
            </div>

            <!-- Main Waveform -->
            <div class="main-waveform-section">
                <div class="main-waveform-container" id="mainWaveformB">
                    <canvas class="main-waveform-canvas" id="mainWaveformCanvasB"></canvas>
                    <div class="waveform-progress" id="waveformProgressB"></div>
                    <input type="range" class="waveform-seek-slider" id="seekSliderB" min="0" max="100" value="0" 
                           oninput="window.handleSeek('B', this.value)">
                </div>
                <div class="track-time-info">
                    <span id="currentTimeB">0:00</span> / <span id="durationB">0:00</span>
                </div>
            </div>

            <!-- Deck Controls -->
            <div class="deck-controls">
                <button class="play-deck-btn" onclick="window.toggleDeckPlayback('B')">
                    PLAY DECK B
                </button>
            </div>

            <!-- Volume -->
            <div class="volume-section">
                <div class="volume-label">Volume <span id="volumeLabelB">50</span>%</div>
                <input type="range" class="volume-slider" id="volumeSliderB" min="0" max="100" value="50" 
                       oninput="window.updateDeckVolume('B', this.value)">
            </div>

            <!-- Waveforms -->
            <div class="waveform-section">
                <div class="waveform-label">BASS/KICK</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformBassB"></canvas>
                </div>
            </div>
            <div class="waveform-section">
                <div class="waveform-label">DRUMS</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformDrumsB"></canvas>
                </div>
            </div>
            <div class="waveform-section">
                <div class="waveform-label">SYNTH</div>
                <div class="waveform-display">
                    <canvas class="waveform-canvas" id="waveformSynthB"></canvas>
                </div>
            </div>

        </div>


        <!-- Center Controls -->
        <button class="stop-hand-dj" id="stopHandDJ" style="display: none;" onclick="stopHandDJ()">
            STOP HAND DJ
        </button>


        <button class="play-both-btn" id="playBothBtn" onclick="window.playBothDecks()">
            PLAY BOTH DECKS A & B
        </button>
        
        <button class="play-both-btn" id="testAudioBtn" style="display: none; bottom: 40px; background: #ff0080;" onclick="testSimpleAudio()">
            TEST AUDIO
        </button>


    </div>

    <!-- Track Browser Modal -->
    <div class="modal" id="trackBrowserModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Track for <span id="modalDeckLabel">Deck A</span></h3>
                <button class="modal-close" onclick="hideTrackBrowser()">×</button>
            </div>
            <div class="modal-body">
                <div class="track-search">
                    <input type="text" id="trackSearchInput" placeholder="Search tracks...">
                    <button class="search-btn" onclick="searchTracks()">Search</button>
                </div>
                <div class="genre-filters">
                    <button class="genre-btn active" data-genre="all" onclick="filterByGenre('all')">ALL</button>
                    <button class="genre-btn" data-genre="house" onclick="filterByGenre('house')">HOUSE</button>
                    <button class="genre-btn" data-genre="techno" onclick="filterByGenre('techno')">TECHNO</button>
                    <button class="genre-btn" data-genre="dubstep" onclick="filterByGenre('dubstep')">DUBSTEP</button>
                    <button class="genre-btn" data-genre="trap" onclick="filterByGenre('trap')">TRAP</button>
                    <button class="genre-btn" data-genre="drum & bass" onclick="filterByGenre('drum & bass')">DRUM & BASS</button>
                    <button class="genre-btn" data-genre="trance" onclick="filterByGenre('trance')">TRANCE</button>
                    <button class="genre-btn" data-genre="edm" onclick="filterByGenre('edm')">EDM</button>
                </div>
                <div class="bpm-filter-section">
                    <div class="bpm-filter-label">
                        <span>BPM Range:</span>
                        <span id="bpmRangeDisplay">115 - 125</span>
                    </div>
                    <input type="range" class="bpm-slider" id="bpmSlider" min="60" max="180" value="120" 
                           oninput="updateBPMFilter(this.value)">
                    <div class="bpm-slider-labels">
                        <span>60</span>
                        <span>90</span>
                        <span>120</span>
                        <span>150</span>
                        <span>180</span>
                    </div>
                </div>
                <div class="track-list" id="trackList">
                    <!-- Tracks will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="/static/js/core/app-state.js"></script>
    <script src="/static/js/audio/multi-channel-audio.js"></script>
    <script src="/static/js/audio/deck-manager.js"></script>
    <script src="/static/js/deck/deck-functions.js"></script>
    <script src="/static/js/visuals/hand-mask-renderer.js"></script>
    <script src="/static/js/visuals/waveform-visualizer.js"></script>
    <script src="/static/js/visuals/main-waveform.js"></script>
    <script src="/static/js/controls/hand-tracking.js"></script>
    <script src="/static/js/gestures/hand-gestures.js"></script>
    <script src="/static/js/gestures/palm-detector.js"></script>
    <script src="/static/js/ui/fullscreen-studio.js"></script>
    <script src="/static/js/ui/gesture-feedback.js"></script>
    <script src="/static/js/deck/simple-deck-loader.js"></script>
    <script src="/static/js/deck/advanced-audio-splitter.js"></script>
    <script src="/static/js/deck/audio-waveform-renderer.js"></script>
    <script src="/static/js/integration/gesture-integration-bridge.js"></script>
    <script src="/static/js/mediapipe-hand-init.js"></script>
    
    <script>
        // Current genre filter
        window.currentGenreFilter = 'all';
        window.currentBPM = 120;
        window.bpmTolerance = 5;
        
        // Define selectTrackForDeck function directly in HTML to ensure it's available
        window.selectTrackForDeck = function(deck) {
            console.log(`🎵 Opening track browser for Deck ${deck} (from inline script)`);
            
            // Store current deck selection globally
            window.currentDeckSelection = deck;
            // Don't reset genre filter - keep the last selected genre
            if (typeof studioState !== 'undefined') {
                studioState.currentDeckSelection = deck;
            }
            
            // Reset genre buttons
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.genre === 'all');
            });
            
            // Simple modal display
            const modal = document.getElementById('trackBrowserModal');
            if (modal) {
                modal.style.display = 'block';
                
                // Update modal styling based on deck
                const modalContent = modal.querySelector('.modal-content');
                if (modalContent) {
                    if (deck === 'B') {
                        modalContent.classList.add('deck-b');
                    } else {
                        modalContent.classList.remove('deck-b');
                    }
                }
                
                // Update deck label
                const label = document.getElementById('modalDeckLabel');
                if (label) label.textContent = `Deck ${deck}`;
                
                // Load DJ-friendly tracks with BPM filter
                const trackList = document.getElementById('trackList');
                if (trackList) {
                    // Show loading spinner immediately
                    trackList.innerHTML = `
                        <div class="loading">
                            <div class="loading-spinner">
                                <div class="vinyl-record">
                                    <div class="record-label"></div>
                                    <div class="tonearm-dot"></div>
                                </div>
                            </div>
                            <div class="loading-text">Loading tracks...</div>
                        </div>
                    `;
                    // Then load tracks
                    setTimeout(() => loadTracksByGenre('all'), 100);
                }
                
                // Focus search input
                const searchInput = document.getElementById('trackSearchInput');
                if (searchInput) {
                    searchInput.value = '';
                    searchInput.focus();
                }
            } else {
                console.error('Modal not found!');
                alert('Track browser not available. Please refresh the page.');
            }
        };
        
        // Hide track browser
        window.hideTrackBrowser = function() {
            const modal = document.getElementById('trackBrowserModal');
            if (modal) {
                modal.style.display = 'none';
            }
        };
        
        // Direct track selection
        window.selectTrackDirect = function(index, deck) {
            console.log(`🎯 selectTrackDirect: Selecting track ${index} for deck ${deck}`);
            if (window.tempTracks && window.tempTracks[index]) {
                const track = window.tempTracks[index];
                console.log('Selected track:', track);
                console.log('Track title:', track.title);
                console.log('Track artwork:', track.artwork);
                console.log('Track user:', track.user);
                
                // ALWAYS use the simple loader - this is the correct way
                if (window.loadTrackToSpecificDeck) {
                    console.log('✅ Using loadTrackToSpecificDeck');
                    window.loadTrackToSpecificDeck(track, deck);
                } else {
                    console.error('❌ loadTrackToSpecificDeck not available yet');
                    // Store for retry
                    window.pendingTrackLoad = { track, deck };
                }
                
                // DO NOT call updateTrackDisplayDirect here - let loadTrackToSpecificDeck handle it
                
                // Hide modal
                window.hideTrackBrowser();
            } else {
                console.error('❌ No track found at index', index);
            }
        };
        
        // Direct UI update function
        window.updateTrackDisplayDirect = function(deck, track) {
            console.log(`🎯 updateTrackDisplayDirect called for Deck ${deck}:`, track);
            
            const trackDisplay = document.getElementById(`trackDisplay${deck}`);
            if (!trackDisplay) {
                console.error(`❌ trackDisplay${deck} not found in DOM`);
                // Try to find all elements with track-display class for debugging
                const allTrackDisplays = document.querySelectorAll('.track-display');
                console.log(`Found ${allTrackDisplays.length} elements with .track-display class:`, allTrackDisplays);
                return;
            }
            
            console.log(`✅ Found trackDisplay${deck} element:`, trackDisplay);
            
            // Get album cover URL
            let albumCoverUrl = null;
            if (track.artwork) {
                if (typeof track.artwork === 'string') {
                    albumCoverUrl = track.artwork;
                } else if (typeof track.artwork === 'object') {
                    albumCoverUrl = track.artwork['1000x1000'] || 
                                   track.artwork['480x480'] || 
                                   track.artwork['150x150'];
                }
            }
            
            if (!albumCoverUrl) {
                albumCoverUrl = track.cover_art || 
                               track.user?.profile_picture?.['480x480'] ||
                               track.user?.avatar_url;
            }
            
            // Update the display
            const newHTML = `
                <div class="track-loaded">
                    <div class="track-art">
                        ${albumCoverUrl ? 
                            `<img src="${albumCoverUrl}" alt="Album Cover" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">` :
                            `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #00d4ff, #ff0080); border-radius: 8px;">♪</div>`
                        }
                    </div>
                    <div class="track-info">
                        <div class="track-name">${track.title || 'Unknown'}</div>
                        <div class="track-artist">${track.user?.username || track.artist || 'Unknown Artist'}</div>
                    </div>
                </div>
            `;
            
            console.log(`📝 Setting new HTML for trackDisplay${deck}`);
            trackDisplay.innerHTML = newHTML;
            trackDisplay.classList.add('has-track');
            console.log(`✅ Track display updated successfully for Deck ${deck}`);
            
            // Verify the update worked
            const verifyUpdate = trackDisplay.querySelector('.track-loaded');
            if (verifyUpdate) {
                console.log(`✅ Verified: .track-loaded element exists in DOM for Deck ${deck}`);
            } else {
                console.error(`❌ ERROR: .track-loaded element NOT found after update for Deck ${deck}`);
            }
        };
        
        // Search tracks function
        window.searchTracks = function() {
            const query = document.getElementById('trackSearchInput').value.trim();
            if (!query) return;
            
            const trackList = document.getElementById('trackList');
            trackList.innerHTML = '<div class="loading">Searching...</div>';
            
            fetch(`/api/audius/search/?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.tracks && data.tracks.length > 0) {
                        const deck = (typeof studioState !== 'undefined' && studioState.currentDeckSelection) || 'A';
                        const html = data.tracks.map((track, index) => `
                            <div class="track-item" onclick="window.selectTrackDirect(${index}, '${deck}')">
                                <div class="track-info">
                                    <div class="track-title">${track.title || 'Unknown'}</div>
                                    <div class="track-artist">${track.user?.username || track.artist || 'Unknown Artist'}</div>
                                </div>
                            </div>
                        `).join('');
                        trackList.innerHTML = html;
                        window.tempTracks = data.tracks;
                    } else {
                        trackList.innerHTML = '<div class="empty">No tracks found</div>';
                    }
                })
                .catch(error => {
                    console.error('Search failed:', error);
                    trackList.innerHTML = '<div class="error">Search failed</div>';
                });
        };
        
        // Update BPM filter
        window.updateBPMFilter = function(value) {
            window.currentBPM = parseInt(value);
            
            // Calculate tolerance based on BPM range
            if (window.currentBPM < 90) {
                window.bpmTolerance = 3;
            } else if (window.currentBPM < 120) {
                window.bpmTolerance = 5;
            } else if (window.currentBPM < 140) {
                window.bpmTolerance = 7;
            } else {
                window.bpmTolerance = 10;
            }
            
            // Update display
            const minBPM = window.currentBPM - window.bpmTolerance;
            const maxBPM = window.currentBPM + window.bpmTolerance;
            document.getElementById('bpmRangeDisplay').textContent = `${minBPM} - ${maxBPM}`;
            
            // Reload tracks with new BPM filter
            loadTracksByGenre(window.currentGenreFilter);
        };
        
        // Filter by genre
        window.filterByGenre = function(genre) {
            console.log(`🎵 Filtering by genre: ${genre}`);
            
            // Update active button
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.genre === genre);
            });
            
            // Store current genre
            window.currentGenreFilter = genre;
            
            // Load tracks for this genre
            loadTracksByGenre(genre);
        };
        
        // Load tracks by genre
        window.loadTracksByGenre = function(genre) {
            const trackList = document.getElementById('trackList');
            const deck = window.currentDeckSelection || 'A';
            
            // Clear any existing error states
            trackList.classList.remove('error-state');
            trackList.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner">
                        <div class="vinyl-record">
                            <div class="record-label"></div>
                            <div class="tonearm-dot"></div>
                        </div>
                    </div>
                    <div class="loading-text">Loading tracks...</div>
                </div>
            `;
            
            let url;
            if (genre === 'all') {
                // Use trending for 'all' genres
                url = `/api/audius/trending/?limit=50&bpm_filter=true&target_bpm=${window.currentBPM}&bpm_tolerance=${window.bpmTolerance}`;
            } else {
                // Use genre playlists for specific genres
                url = `/api/audius/genre-playlists/?genre=${encodeURIComponent(genre)}&bpm_filter=true&target_bpm=${window.currentBPM}&bpm_tolerance=${window.bpmTolerance}`;
            }
            
            console.log(`Loading tracks: genre=${genre}, BPM=${window.currentBPM}±${window.bpmTolerance}`);
            
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.tracks && data.tracks.length > 0) {
                        displayTracks(data.tracks, deck);
                    } else {
                        const minBPM = window.currentBPM - window.bpmTolerance;
                        const maxBPM = window.currentBPM + window.bpmTolerance;
                        trackList.innerHTML = `<div class="empty">No ${genre} tracks found between ${minBPM}-${maxBPM} BPM.<br>Try adjusting the BPM slider.</div>`;
                    }
                })
                .catch(error => {
                    console.error('Failed to load tracks:', error);
                    trackList.innerHTML = '<div class="error">Failed to load tracks. Click to retry.</div>';
                    trackList.classList.add('error-state');
                    trackList.onclick = () => loadTracksByGenre(genre);
                });
        };
        
        // Display tracks function
        window.displayTracks = function(tracks, deck) {
            const trackList = document.getElementById('trackList');
            if (!tracks || tracks.length === 0) {
                trackList.innerHTML = '<div class="empty">No tracks found</div>';
                return;
            }
            
            const html = tracks.map((track, index) => {
                const bpmDisplay = track.bpm ? `${Math.round(track.bpm)} BPM` : '';
                const genreDisplay = track.genre || '';
                
                return `
                    <div class="track-item" onclick="window.selectTrackDirect(${index}, '${deck}')">
                        <div class="track-info">
                            <div class="track-title">${track.title || 'Unknown'}</div>
                            <div class="track-artist">${track.artist || 'Unknown Artist'}</div>
                            <div class="track-meta">
                                ${bpmDisplay ? `<span class="track-bpm">${bpmDisplay}</span>` : ''}
                                ${genreDisplay ? `<span class="track-genre">${genreDisplay}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            trackList.innerHTML = html;
            window.tempTracks = tracks;
        };
        
        // Search tracks function with DJ filter
        window.searchTracks = function() {
            const query = document.getElementById('trackSearchInput').value.trim();
            if (!query) {
                // If empty, reload current genre
                loadTracksByGenre(window.currentGenreFilter);
                return;
            }
            
            const trackList = document.getElementById('trackList');
            trackList.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner">
                        <div class="vinyl-record">
                            <div class="record-label"></div>
                            <div class="tonearm-dot"></div>
                        </div>
                    </div>
                    <div class="loading-text">Searching DJ tracks...</div>
                </div>
            `;
            
            const deck = window.currentDeckSelection || 'A';
            
            // Search with BPM filter, don't append genre to query
            fetch(`/api/audius/search/?q=${encodeURIComponent(query)}&limit=50&bpm_filter=true&target_bpm=${window.currentBPM}&bpm_tolerance=${window.bpmTolerance}`)
                .then(response => response.json())
                .then(data => {
                    if (data.tracks && data.tracks.length > 0) {
                        // Display all search results, genre filtering is done by the user's genre selection
                        displayTracks(data.tracks, deck);
                    } else {
                        trackList.innerHTML = '<div class="empty">No DJ tracks found matching your search</div>';
                    }
                })
                .catch(error => {
                    console.error('Search error:', error);
                    trackList.innerHTML = '<div class="error">Search failed</div>';
                });
        };
        
        // Listen for track loaded events
        window.addEventListener('trackLoaded', function(event) {
            console.log('Track loaded event received:', event.detail);
            const { deck, track } = event.detail;
            window.updateTrackDisplayDirect(deck, track);

        // Simple audio test function
        function testSimpleAudio() {
            console.log('=== TESTING SIMPLE AUDIO ===');
            
            try {
                // Create a simple Web Audio API test
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                console.log('Audio context created, state:', audioCtx.state);
                
                // Resume if suspended
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        playTestTone(audioCtx);
                    });
                } else {
                    playTestTone(audioCtx);
                }
                
            } catch (error) {
                console.error('Simple audio test failed:', error);
                alert('Audio test failed: ' + error.message);
            }
        }
        
        function playTestTone(audioCtx) {
            console.log('Playing test tone...');
            
            // Create oscillator
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Configure oscillator
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A note
            
            // Configure gain
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            
            // Connect nodes
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Play for 1 second
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 1);
            
            console.log('Test tone should be playing...');
            alert('Test tone playing! If you hear it, audio is working.');
        }
        
        // Make it global
        window.testSimpleAudio = testSimpleAudio;
        
        // MediaPipe Hands Initialization - Inline Version
        window.initializeMediaPipeHands = function() {
            console.log('🚀 Initializing MediaPipe Hands (Inline)...');
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            
            if (!video || !canvas) {
                console.error('Video or canvas element not found!');
                return;
            }
            
            console.log('📹 Video element:', video);
            console.log('🎨 Canvas element:', canvas);
            
            const ctx = canvas.getContext('2d');
            
            // Set canvas size to match video
            function resizeCanvas() {
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                console.log(`📐 Canvas resized to ${canvas.width}x${canvas.height}`);
            }
            
            video.addEventListener('loadedmetadata', resizeCanvas);
            resizeCanvas();
            
            try {
                console.log('🤲 Creating Hands instance...');
                const hands = new Hands({
                    locateFile: (file) => {
                        const url = `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                        console.log(`📁 Loading: ${file}`);
                        return url;
                    }
                });
                
                console.log('⚙️ Setting Hands options...');
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.5
                });
                
                window.handTracker = hands;
                
                // Volume control state
                const volumeState = {
                    leftHandY: null,
                    rightHandY: null,
                    lastUpdate: 0,
                    updateInterval: 100,
                    smoothing: 0.3
                };
                
                // Gesture state
                const gestureState = {
                    lastLeftFingers: 0,
                    lastRightFingers: 0,
                    lastGesture: 0,
                    debounce: 500
                };
                
                console.log('🎯 Setting up onResults callback...');
                hands.onResults((results) => {
                    console.log('👋 Hand detection results!', results.multiHandLandmarks?.length || 0, 'hands');
                    
                    ctx.save();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
                    
                    if (results.multiHandLandmarks && results.multiHandedness) {
                        results.multiHandLandmarks.forEach((landmarks, index) => {
                            const handedness = results.multiHandedness[index];
                            const isLeft = handedness.label === 'Right'; // Mirrored
                            const color = isLeft ? '#00d4ff' : '#ff8a00';
                            const deck = isLeft ? 'A' : 'B';
                            
                            console.log(`Hand ${index}: ${handedness.label} -> Deck ${deck}`);
                            
                            // Draw hand
                            drawHand(ctx, landmarks, color, canvas);
                            
                            // Handle volume
                            handleVolume(landmarks, deck, isLeft, volumeState);
                            
                            // Handle gestures
                            handleGestures(landmarks, deck, isLeft, gestureState);
                        });
                    }
                    
                    ctx.restore();
                });
                
                // Start processing frames
                console.log('🎬 Starting frame processing...');
                let processing = false;
                const processFrame = async () => {
                    if (!processing && video.readyState === 4) {
                        processing = true;
                        try {
                            await hands.send({image: video});
                        } catch (err) {
                            console.error('Frame processing error:', err);
                        }
                        processing = false;
                    }
                    requestAnimationFrame(processFrame);
                };
                
                processFrame();
                console.log('✅ MediaPipe Hands initialized successfully!');
                
            } catch (err) {
                console.error('❌ Error initializing MediaPipe:', err);
            }
        };
        
        // Helper functions
        function drawHand(ctx, landmarks, color, canvas) {
            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],     // Thumb
                [0, 5], [5, 6], [6, 7], [7, 8],     // Index
                [0, 9], [9, 10], [10, 11], [11, 12], // Middle
                [0, 13], [13, 14], [14, 15], [15, 16], // Ring
                [0, 17], [17, 18], [18, 19], [19, 20], // Pinky
                [5, 9], [9, 13], [13, 17]           // Palm
            ];
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            
            connections.forEach(([start, end]) => {
                const s = landmarks[start];
                const e = landmarks[end];
                ctx.beginPath();
                ctx.moveTo(s.x * canvas.width, s.y * canvas.height);
                ctx.lineTo(e.x * canvas.width, e.y * canvas.height);
                ctx.stroke();
            });
            
            ctx.shadowBlur = 0;
            landmarks.forEach((landmark, idx) => {
                const x = landmark.x * canvas.width;
                const y = landmark.y * canvas.height;
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, 2 * Math.PI);
                ctx.fill();
                
                if ([4, 8, 12, 16, 20].includes(idx)) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            });
        }
        
        function handleVolume(landmarks, deck, isLeft, state) {
            const now = Date.now();
            if (now - state.lastUpdate < state.updateInterval) return;
            
            const wristY = landmarks[0].y;
            const volume = Math.round((1 - wristY) * 100);
            
            console.log(`🔊 ${deck} volume: ${volume}%`);
            
            if (window.updateDeckVolume) {
                window.updateDeckVolume(deck, volume);
            }
            
            const slider = document.getElementById(`volumeSlider${deck}`);
            if (slider) slider.value = volume;
            
            state.lastUpdate = now;
        }
        
        function handleGestures(landmarks, deck, isLeft, state) {
            const fingerCount = countFingers(landmarks);
            const now = Date.now();
            
            if (now - state.lastGesture < state.debounce) return;
            
            const lastCount = isLeft ? state.lastLeftFingers : state.lastRightFingers;
            
            if (fingerCount !== lastCount && fingerCount >= 1 && fingerCount <= 3) {
                const channels = {1: 'bass', 2: 'drums', 3: 'synth'};
                const channel = channels[fingerCount];
                
                console.log(`🎛️ ${fingerCount} fingers -> ${channel} on Deck ${deck}`);
                
                if (channel && window.toggleAudioChannel) {
                    window.toggleAudioChannel(deck, channel);
                    state.lastGesture = now;
                }
            }
            
            if (isLeft) state.lastLeftFingers = fingerCount;
            else state.lastRightFingers = fingerCount;
        }
        
        function countFingers(landmarks) {
            let count = 0;
            
            // Thumb
            const thumbTip = landmarks[4];
            const wrist = landmarks[0];
            const thumbDist = Math.sqrt(
                Math.pow(thumbTip.x - wrist.x, 2) + 
                Math.pow(thumbTip.y - wrist.y, 2)
            );
            if (thumbDist > 0.15) count++;
            
            // Other fingers
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            
            for (let i = 0; i < 4; i++) {
                if (landmarks[tips[i]].y < landmarks[pips[i]].y - 0.03) {
                    count++;
                }
            }
            
            return count;
        }

        // Add keyboard shortcuts for channel control
        function setupChannelKeyboardShortcuts() {
            document.addEventListener('keydown', function(e) {
                // Ignore if typing in an input field
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return;
                }
                
                // Check if toggleAudioChannel function exists
                if (!window.toggleAudioChannel) {
                    return;
                }
                
                switch(e.key) {
                    case '1':
                        e.preventDefault();
                        window.toggleAudioChannel('A', 'bass');
                        console.log('🎹 Key 1: Toggle Bass for Deck A');
                        break;
                    case '2':
                        e.preventDefault();
                        window.toggleAudioChannel('A', 'drums');
                        console.log('🎹 Key 2: Toggle Drums for Deck A');
                        break;
                    case '3':
                        e.preventDefault();
                        window.toggleAudioChannel('A', 'synth');
                        console.log('🎹 Key 3: Toggle Synth for Deck A');
                        break;
                    case '4':
                        e.preventDefault();
                        window.toggleAudioChannel('B', 'bass');
                        console.log('🎹 Key 4: Toggle Bass for Deck B');
                        break;
                    case '5':
                        e.preventDefault();
                        window.toggleAudioChannel('B', 'drums');
                        console.log('🎹 Key 5: Toggle Drums for Deck B');
                        break;
                    case '6':
                        e.preventDefault();
                        window.toggleAudioChannel('B', 'synth');
                        console.log('🎹 Key 6: Toggle Synth for Deck B');
                        break;
                }
            });
            
            console.log('🎹 Channel keyboard shortcuts initialized:');
            console.log('  Keys 1,2,3 = Bass,Drums,Synth for Deck A');
            console.log('  Keys 4,5,6 = Bass,Drums,Synth for Deck B');
        }
        
        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                initializeApp();
                setupSearchKeyHandler();
                setupChannelKeyboardShortcuts();
            });
        } else {
            initializeApp();
            setupSearchKeyHandler();
            setupChannelKeyboardShortcuts();
        }
        
        // Check for pending track load
        setInterval(() => {
            if (window.pendingTrackLoad && window.loadTrackToSpecificDeck) {
                const { track, deck } = window.pendingTrackLoad;
                console.log('Retrying pending track load...');
                window.loadTrackToSpecificDeck(track, deck);
                window.pendingTrackLoad = null;
            }
        }, 100);
        
        // Create compatibility bridge for main-waveform.js
        window.deckPlayers = window.simpleDeckData || {};
        
        // Override seekToPosition to use our system
        window.seekToPosition = function(deckLetter, percentage) {
            if (window.simpleDeckData && window.simpleDeckData[deckLetter] && window.simpleDeckData[deckLetter].audio) {
                const audio = window.simpleDeckData[deckLetter].audio;
                if (audio.duration) {
                    audio.currentTime = (percentage / 100) * audio.duration;
                }
            }
        };
